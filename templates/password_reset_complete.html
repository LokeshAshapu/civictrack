<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CivicTrack - Password Reset Complete</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://kit.fontawesome.com/8d0d017efe.js" crossorigin="anonymous"></script>
    <style>
        * {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
    </style>
</head>

<body class="bg-white min-vh-100 d-flex flex-column justify-content-between position-relative overflow-x-hidden">

    <!-- Top Left Corner Application Brand Logo -->
    <div class="position-absolute top-0 start-0 p-4 z-3">
        <a href="/" class="d-inline-block text-decoration-none">
            <img src="/static/images/logo.png" alt="CivicTrack Logo"
                class="rounded-circle shadow-sm border border-light-subtle"
                style="width: 55px; height: 55px; object-fit: contain;">
        </a>
    </div>

    <!-- Main Content Grid Structure -->
    <div class="d-flex align-items-center justify-content-center" style="min-height: 80vh; padding: 80px;">
        <div class="card shadow-lg border-0 rounded-4 p-5 text-center mx-auto" style="max-width: 500px; background: rgba(255, 255, 255, 0.9);">
            <div class="text-success mb-4" style="font-size: 3rem;">
                <i class="fa-solid fa-circle-check"></i>
            </div>
            <h2 class="fw-bold text-dark mb-3">Password Reset Complete!</h2>
            <p class="text-secondary small fw-medium mb-4" style="font-size: 0.95rem; line-height: 1.6;">
                Your password has been successfully updated. You can now use your new password to access your CivicTrack account.
            </p>
            <a href="{% url 'login' %}" class="btn text-white fw-semibold rounded-4 border-0 w-100 shadow-sm d-flex align-items-center justify-content-center"
               style="background-color: #0d3b73; height: 50px;">
                Log In
            </a>
        </div>
    </div>

    <!-- Production Compliance Lower Border Footer Bar -->
    <footer class="w-100 text-center py-4 border-top border-light-subtle bg-white bottom-0">
        <p class="text-muted small mb-0 fw-medium" style="font-size: 0.8rem; letter-spacing: 0.3px;">
            &copy; CivicTrack &bull; <a href="/terms-of-service/" class="text-muted text-decoration-none mx-1 link-primary">TOS</a>
            &bull; <a href="/privacy-policy/" class="text-muted text-decoration-none mx-1 link-primary">Privacy Policies</a> &bull; <a
                href="/imprint/" class="text-muted text-decoration-none mx-1 link-primary">Imprint</a>
        </p>
    </footer>

    <!-- JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
