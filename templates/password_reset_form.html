<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CivicTrack - Reset Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://kit.fontawesome.com/8d0d017efe.js" crossorigin="anonymous"></script>
    <style>
        * {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .form-icon-group {
            position: relative;
            width: 100%;
        }

        .form-icon-group .form-control {
            padding-left: 52px !important;
            padding-right: 52px !important;
            height: 56px;
            font-size: 0.95rem;
            transition: all 0.2s ease-in-out;
        }

        .form-icon-group .form-control:focus {
            border-color: #0d3b73 !important;
            box-shadow: 0 0 0 0.25rem rgba(13, 59, 115, 0.15) !important;
        }
    </style>
</head>

<body class="bg-white min-vh-100 d-flex flex-column justify-content-between position-relative overflow-x-hidden">

    <!-- Top Left Corner Application Brand Logo -->
    <div class="position-absolute top-0 start-0 p-4 z-3">
        <a href="/" class="d-inline-block text-decoration-none">
            <img src="/static/images/logo.png" alt="CivicTrack Logo"
                class="rounded-circle shadow-sm border border-light-subtle"
                style="width: 55px; height: 55px; object-fit: contain;">
        </a>
    </div>

    <!-- Main Content Grid Structure -->
    <div class="d-flex align-items-center justify-content-center" style="min-height: 80vh; padding: 80px;">
        <div class="row align-items-center justify-content-center w-100">
            <div class="mb-4 text-center">
                <h1 class="fw-bold text-dark mb-1 fs-2">Reset Password</h1>
                <p class="text-secondary small fw-medium">Forgotten your password? Enter your email address below, and we'll send you an recovery link. ✉️</p>
            </div>

            {% if form.errors %}
            <div class="mx-auto" style="max-width: 420px;">
                <div class="alert alert-danger py-2 text-center" role="alert">
                    Please enter a valid email address.
                </div>
            </div>
            {% endif %}

            <form class="d-flex flex-column gap-3 mx-auto text-start" style="max-width: 420px;" method="POST">
                {% csrf_token %}

                <!-- Email Address Field with Fixed Inline SVG Icon -->
                <div class="form-icon-group" style="position: relative; width: 100%;">
                    <!-- Inline SVG Envelope Icon -->
                    <svg class="text-muted" width="18" height="18" fill="currentColor" viewBox="0 0 16 16"
                        style="position: absolute; left: 20px; top: 50%; transform: translateY(-50%); z-index: 10; pointer-events: none; color: #adb5bd;">
                        <path
                            d="M0 4a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2zm2-1a1 1 0 0 0-1 1v.217l7 4.2 7-4.2V4a1 1 0 0 0-1-1zm13 2.383-4.708 2.825L15 11.105zm-.034 6.876-5.64-3.471L8 9.583l-1.326-.795-5.64 3.47A1 1 0 0 0 2 13h12a1 1 0 0 0 .966-.741M1 11.105l4.708-2.897L1 5.383z" />
                    </svg>
                    <input type="email" name="email" required autocomplete="email"
                        class="form-control border border-secondary-subtle bg-white shadow-none rounded-4 text-dark"
                        placeholder="Email address"
                        style="padding-left: 52px !important; padding-right: 52px !important; height: 56px; font-size: 0.95rem; width: 100%;">
                </div>

                <!-- Submit Button -->
                <button type="submit"
                    class="btn text-white fw-semibold rounded-4 border-0 w-100 shadow-sm d-flex align-items-center justify-content-center transition-all"
                    style="background-color: #0d3b73; font-size: 1.05rem; height: 56px;">
                    Send Reset Link
                </button>

                <!-- Back to Login Link -->
                <div class="text-center mt-3">
                    <p class="text-secondary small fw-medium mb-0"><a href="{% url 'login' %}"
                            class="text-primary text-decoration-underline fw-semibold">Back to Login</a></p>
                </div>
            </form>
        </div>
    </div>

    <!-- Production Compliance Lower Border Footer Bar -->
    <footer class="w-100 text-center py-4 border-top border-light-subtle bg-white bottom-0">
        <p class="text-muted small mb-0 fw-medium" style="font-size: 0.8rem; letter-spacing: 0.3px;">
            &copy; CivicTrack &bull; <a href="/terms-of-service/" class="text-muted text-decoration-none mx-1 link-primary">TOS</a>
            &bull; <a href="/privacy-policy/" class="text-muted text-decoration-none mx-1 link-primary">Privacy Policies</a> &bull; <a
                href="/imprint/" class="text-muted text-decoration-none mx-1 link-primary">Imprint</a>
        </p>
    </footer>

    <!-- JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
